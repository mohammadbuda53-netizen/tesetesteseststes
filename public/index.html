<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwerker Management App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>🔧 Handwerker Management</h1>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="showDashboard()">Dashboard</button>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
            <button class="tab-btn" onclick="switchTab('craftsmen')">👷 Handwerker</button>
            <button class="tab-btn" onclick="switchTab('customers')">👥 Kunden</button>
            <button class="tab-btn" onclick="switchTab('jobs')">📋 Aufträge</button>
            <button class="tab-btn" onclick="switchTab('appointments')">📅 Termine</button>
            <button class="tab-btn" onclick="switchTab('invoices')">💶 Rechnungen</button>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Dashboard Tab -->
            <div id="dashboard-tab" class="tab-content active">
                <h2>Dashboard</h2>
                <div class="stats-grid" id="stats-grid">
                    <!-- Stats will be loaded here -->
                </div>
                <div class="dashboard-sections">
                    <div class="dashboard-section">
                        <h3>Letzte Aufträge</h3>
                        <div id="recent-jobs"></div>
                    </div>
                    <div class="dashboard-section">
                        <h3>Nächste Termine</h3>
                        <div id="upcoming-appointments"></div>
                    </div>
                </div>
            </div>

            <!-- Craftsmen Tab -->
            <div id="craftsmen-tab" class="tab-content">
                <div class="tab-header">
                    <h2>Handwerker</h2>
                    <button class="btn btn-primary" onclick="showCraftsmanModal()">+ Neuer Handwerker</button>
                </div>
                <div id="craftsmen-list" class="data-list"></div>
            </div>

            <!-- Customers Tab -->
            <div id="customers-tab" class="tab-content">
                <div class="tab-header">
                    <h2>Kunden</h2>
                    <button class="btn btn-primary" onclick="showCustomerModal()">+ Neuer Kunde</button>
                </div>
                <div id="customers-list" class="data-list"></div>
            </div>

            <!-- Jobs Tab -->
            <div id="jobs-tab" class="tab-content">
                <div class="tab-header">
                    <h2>Aufträge</h2>
                    <button class="btn btn-primary" onclick="showJobModal()">+ Neuer Auftrag</button>
                </div>
                <div id="jobs-list" class="data-list"></div>
            </div>

            <!-- Appointments Tab -->
            <div id="appointments-tab" class="tab-content">
                <div class="tab-header">
                    <h2>Termine</h2>
                    <button class="btn btn-primary" onclick="showAppointmentModal()">+ Neuer Termin</button>
                </div>
                <div id="appointments-list" class="data-list"></div>
            </div>

            <!-- Invoices Tab -->
            <div id="invoices-tab" class="tab-content">
                <div class="tab-header">
                    <h2>Rechnungen</h2>
                    <button class="btn btn-primary" onclick="showInvoiceModal()">+ Neue Rechnung</button>
                </div>
                <div id="invoices-list" class="data-list"></div>
            </div>
        </main>
    </div>

    <!-- Modal Container -->
    <div id="modal-container" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Modal</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
